    <style>
        /* 初始載入層：蓋滿全螢幕，層級最高 */
        #initial-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: transparent;
            z-index: 9999; display: flex; flex-direction: column;
            align-items: center; justify-content: space-between;
            padding: 40vh 0 10vh 0; box-sizing: border-box;
            transition: opacity 1s ease-in-out, visibility 2s;
        }

        .loader-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            color: var(--text-sub);
            letter-spacing: 0.6em; 
            text-indent: 0.6em;    
            font-weight: 360;
            transition: opacity 2s;
        }

/* 1. 初始隱藏狀態 */
.theme-toggle, .mute-control {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transition: opacity 1s ease, visibility 1s; /* 增加平滑漸入效果 */
}

.fonts-ready .theme-toggle {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
}

/* 新增：只有被加上 .show 類別時，Mute 按鈕才顯示 */
.mute-control.show {
    opacity: 1 !important;
    visibility: visible !important;
    pointer-events: auto !important;
}

/* 當準備好時，讓載入層立即失去「點擊攔截」功能 */
.fonts-ready #initial-loader {
    pointer-events: none;
}
        .progress-bar-bg {
            position: absolute; bottom: 15%; width: 45%; max-width: 140px;
            height: 2px; background: rgba(128,128,128,0.2); border-radius: 2px;
            overflow: hidden; opacity: 1; transition: opacity 1s ease;
        }

        .progress-bar-fill {
            width: 0%; height: 100%; background: var(--star-color);
            box-shadow: 0 0 8px rgba(96, 165, 250, 0.5);
            transition: width 0.4s ease-out;
        }

        .fonts-ready .loader-text { opacity: 0; }
        .fonts-ready .progress-bar-bg { opacity: 0; visibility: hidden; }

        /* 主內容：字型未準備好前是透明且模糊的 */
        .overlay {
            opacity: 0; 
            visibility: hidden; 
            filter: blur(15px);
            transition: opacity 1.5s ease, filter 1.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative; z-index: 10; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center;
            box-sizing: border-box; pointer-events: none;
            padding-top: 8vh; 
        }

        .fonts-ready .overlay { 
            opacity: 1; 
            visibility: visible; 
            filter: blur(0px); 
        }

        :root {
            --bg-color: #fdfdfd;
            --text-main: #1a1a1a;
            --text-sub: #888888;
            --accent-glow: rgba(96, 165, 250, 0.25); 
            --card-bg: rgba(255, 255, 255, 0.45); 
            --card-border: rgba(0, 0, 0, 0.08);
            --btn-border: #ddd;
            --star-color: #60a5fa;
        }

        [data-theme="dark"] {
            --bg-color: #0a0a0b;
            --text-main: #f0f0f0;
            --text-sub: #888888;
            --accent-glow: rgba(0, 242, 255, 0.25);

        .placeholder-icon { font-size: 2.8rem; color: var(--star-color); animation: float 4s infinite ease-in-out; filter: drop-shadow(0 0 10px var(--star-color)); opacity: 0.8; }

        .placeholder-icon::after {

            animation: pulse-ripple 2.5s cubic-bezier(0.215, 0.610, 0.355, 1) infinite; pointer-events: none;
        }
        
        .card-content {

 ; transition: all 0.3s ease;

}

}

		/* 同步按鈕定位 (在 mute 鈕上方) */

    <script>
        const canvas = document.getElementById('bg-canvas');
        canvas.style.opacity = "0"; // 初始不可見
        canvas.style.transition = "opacity 1s ease"; // 設定漸入動畫
        
        // 關鍵修復 2：補回 3 秒後讓粒子浮現的觸發器
        setTimeout(() => {
            canvas.style.opacity = "1";
        }, 1500);

        const ctx = canvas ? canvas.getContext('2d') : null;
        const themeBtn = document.getElementById('theme-btn');
        let particles = []; let ripples = []; let isDark = false;

        let initProgressValue = 10;
        const progressFill = document.getElementById('init-progress');
        function updateProgress(val) {
            initProgressValue = Math.max(initProgressValue, val);
            if (progressFill) progressFill.style.width = initProgressValue + '%';
        }
        updateProgress(10); 

        class Particle {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.25; this.vy = (Math.random() - 0.5) * 0.25;
                this.size = isDark ? 1.4 : 1.1; this.colorIndex = Math.floor(Math.random() * 3);
            }
            update() {
                ripples.forEach(r => {
                    const dx = this.x - r.x; const dy = this.y - r.y; const d = Math.sqrt(dx*dx + dy*dy);
                    if (d < r.r && d > r.r - 20) {
                        const f = (r.r - d) / 20; const a = Math.atan2(dy, dx);
                        this.vx += Math.cos(a) * f * 0.5; this.vy += Math.sin(a) * f * 0.5;
                    }
                });
                this.x += this.vx; this.y += this.vy; this.vx *= 0.99; this.vy *= 0.99;
                if(this.x < 0 || this.x > canvas.width) this.vx *= -1; if(this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
            draw(targetCtx) {
                targetCtx.beginPath(); targetCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                const colors = isDark ? ['rgba(0, 242, 255, 0.4)', 'rgba(125, 103, 255, 0.4)', 'rgba(0, 150, 255, 0.4)'] : ['rgba(96, 165, 250, 0.3)', 'rgba(52, 211, 153, 0.25)', 'rgba(147, 197, 253, 0.3)'];
                targetCtx.fillStyle = colors[this.colorIndex]; targetCtx.fill();
            }
        }

        class Ripple {
            constructor(x, y) { this.x = x; this.y = y; this.r = 0; this.opacity = 0.5; this.hue = isDark ? 190 : 210; }
            update() { this.r += (isDark ? 4 : 3); this.opacity *= 0.96; }
            draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2); ctx.strokeStyle = `hsla(${this.hue}, 70%, ${isDark ? '70%' : '60%'}, ${this.opacity})`; ctx.lineWidth = 1; ctx.stroke(); }
        }

        function createParticles() { particles = []; const count = Math.min(40, Math.floor(window.innerWidth / 20)); for(let i=0; i<count; i++) particles.push(new Particle()); }
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; createParticles(); }
        function anim() {
            ctx.fillStyle = isDark ? 'rgba(10, 10, 11, 0.2)' : 'rgba(253, 253, 253, 0.2)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ripples.forEach((r, i) => { r.update(); r.draw(); if(r.opacity < 0.01) ripples.splice(i, 1); });
            particles.forEach((p, i) => { 
                p.update(); p.draw(ctx); 
                for(let j = i + 1; j < particles.length; j++) {
                    const d = Math.hypot(p.x - particles[j].x, p.y - particles[j].y);
                    if(d < 140) {
                        ctx.beginPath(); ctx.strokeStyle = isDark ? `rgba(0, 242, 255, ${(1 - d/140) * 0.2})` : `rgba(96, 165, 250, ${(1 - d/140) * 0.2})`; ctx.lineWidth = 0.5; ctx.moveTo(p.x, p.y); ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(anim);
        }

        resize(); anim();
        window.addEventListener('mousedown', (e) => { if(e.target.tagName !== 'BUTTON') ripples.push(new Ripple(e.clientX, e.clientY)); });
        window.addEventListener('touchstart', (e) => { if(e.target.tagName !== 'BUTTON') ripples.push(new Ripple(e.touches[0].clientX, e.touches[0].clientY)); });
        window.addEventListener('resize', resize);
        themeBtn.addEventListener('click', (e) => { e.stopPropagation(); isDark = !isDark; document.body.setAttribute('data-theme', isDark ? 'dark' : 'light'); themeBtn.innerText = isDark ? '⚫︎月球' : '⚪︎地球'; });

        function getYTIdFromUrl(url) {
            let match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:.*v=|.*\/))([^?&]+)/);
            return match ? match[1] : null;
        }

            if (!isPlayerReady) return;

            particles.forEach((p, i) => { p.draw(tCtx); for(let j = i + 1; j < particles.length; j++) { const d = Math.hypot(p.x - particles[j].x, p.y - particles[j].y); if(d < 140) { tCtx.beginPath(); tCtx.strokeStyle = isDark ? `rgba(0, 242, 255, ${(1 - d/140) * 0.2})` : `rgba(96, 165, 250, ${(1 - d/140) * 0.2})`; tCtx.lineWidth = 0.5; tCtx.moveTo(p.x, p.y); tCtx.lineTo(particles[j].x, particles[j].y); tCtx.stroke(); } } });
            return tempCanvas.toDataURL();
        }

                const canvasOut = await html2canvas(container, { scale: 2, useCORS: true });
                canvasOut.toBlob((blob) => {
                    const cleanFileName = current.s.replace(/[\\/:*?"<>|]/g, '').trim();
                    const url = URL.createObjectURL(blob); 
                    const link = document.createElement('a'); 
                    link.href = url; 
                    link.download = `Resonance_${current.s.substring(0,16)}.png`;
                    
                    link.click(); showToast("已保存至相簿");
                });
            } catch (err) { showToast("下載失敗 可截圖"); } finally { downloadBtn.disabled = false; load.style.display = 'none'; }
        });

        function showToast(msg) { toast.innerText = msg; toast.style.opacity = '1'; setTimeout(() => toast.style.opacity = '0', 3000); }

        // ===== 總進度監聽機制 =====
        let fontsReadyStatus = false;
        let playerReadyStatus = false;

        function checkOverallReady() {
            if (fontsReadyStatus && playerReadyStatus) {
                updateProgress(100);
                setTimeout(() => {
                    document.body.classList.add('fonts-ready');
                    const loader = document.getElementById('initial-loader');
                    setTimeout(() => { loader.style.display = 'none'; }, 2000);
                }, 400); 
            }
        }

        async function waitForFonts() {
            await document.fonts.ready;
            return new Promise((resolve) => {
                const checkFonts = () => {
                    const isWenKaiReady = document.fonts.check('1em "LXGW WenKai TC"');
                    const isMontReady = document.fonts.check('1em "Montserrat"');
                    
                    if (isWenKaiReady && isMontReady) {
                        resolve(); 
                    } else {
                        setTimeout(checkFonts, 100); 
                    }
                };
                checkFonts();
            });
        }

        waitForFonts().then(() => {
            fontsReadyStatus = true;
            updateProgress(50); 
            checkOverallReady();
        });

        // 縮短超時安全機制至 4.5 秒 (若網路異常強行解鎖)
        setTimeout(() => {
            if (!fontsReadyStatus || !playerReadyStatus) {
                fontsReadyStatus = true;
                playerReadyStatus = true;
                updateProgress(100);
                checkOverallReady();
            }
        }, 4500);

		let isSyncEnabled = true; // 預設開啟
let syncTimer = null;
const syncBtn = document.getElementById('sync-btn');
const lyricDisplay = document.querySelector('.lyric-text'); // 獲取顯示文字的元素

// 1. 初始化按鈕狀態
function updateSyncBtnUI() {
    if (isSyncEnabled) {
        syncBtn.classList.add('active');
        syncBtn.classList.remove('inactive');
    } else {
        syncBtn.classList.add('inactive');
        syncBtn.classList.remove('active');
    }
}
updateSyncBtnUI();

// 2. 切換開關
syncBtn.addEventListener('click', () => {
    isSyncEnabled = !isSyncEnabled;
    updateSyncBtnUI();
    triggerHaptic();
    
    if (!isSyncEnabled) {
        lyricDisplay.classList.remove('highlight');
    }
});

// 3. 高光檢測邏輯
function startSyncChecking() {
    if (syncTimer) clearInterval(syncTimer);
    
    syncTimer = setInterval(() => {
        if (!isSyncEnabled || !player || !isPlayerReady) return;

        const currentTime = player.getCurrentTime();
        
        // 檢查目前播放的影片是否與當前歌詞的時間戳匹配
        // 假設 current 是你當前抽中的那句歌詞對象
        if (current && currentTime >= current.start) {
            lyricDisplay.classList.add('highlight');
        } else {
            lyricDisplay.classList.remove('highlight');
        }
    }, 500); // 每 0.5 秒檢查一次
}


lyricDisplay.addEventListener('click', () => {
    if (current && current.start && player) {
        player.seekTo(current.start);
        player.playVideo();
        lyricDisplay.classList.add('highlight');
        triggerHaptic();
    }
});
		
// 阻止右鍵選單
document.oncontextmenu = () => false;

// 阻止 F12 和常見的開發者工具快捷鍵
document.onkeydown = (e) => {
    if (e.keyCode === 123 || 
        (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67))) {
        return false;
    }
};
