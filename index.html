<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>共鳴歌詞 Resonance Lyrics</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&family=LXGW+WenKai+TC:wght@300;400&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
    
    <style>
        /* 初始載入層 */
        #initial-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: transparent;
            z-index: 9999; display: flex; flex-direction: column;
            align-items: center; justify-content: space-between;
            padding: 40vh 0 10vh 0; box-sizing: border-box;
            transition: opacity 1s ease-in-out, visibility 2s;
        }

        .loader-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            color: var(--text-sub);
            letter-spacing: 0.6em; 
            text-indent: 0.6em;    
            font-weight: 360;
            transition: opacity 2s;
        }

        /* 統一控制基礎懸浮按鈕的初始狀態 */
        .theme-toggle, .mute-control, #sync-btn, #history-btn {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1), visibility 1s, background-color 0.3s, border-color 0.3s, color 0.3s;
        }

        .fonts-ready .theme-toggle {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        /* 歌詞頁面展開時，音量與同步按鈕的顯現 Class */
        .mute-control.show, #sync-btn.show {
            opacity: 1 !important;
            visibility: visible !important;
            pointer-events: auto !important;
        }

        .fonts-ready #initial-loader {
            pointer-events: none;
        }

        .progress-bar-bg {
            position: absolute; bottom: 15%; width: 45%; max-width: 140px;
            height: 2px; background: rgba(128,128,128,0.2); border-radius: 2px;
            overflow: hidden; opacity: 1; transition: opacity 1s ease;
        }

        .progress-bar-fill {
            width: 0%; height: 100%; background: var(--star-color);
            box-shadow: 0 0 8px rgba(96, 165, 250, 0.5);
            transition: width 0.4s ease-out;
        }

        .fonts-ready .loader-text { opacity: 0; }
        .fonts-ready .progress-bar-bg { opacity: 0; visibility: hidden; }

        .overlay {
            opacity: 0; 
            visibility: hidden; 
            filter: blur(15px);
            transition: opacity 1.5s ease, filter 1.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative; z-index: 10; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center;
            box-sizing: border-box; pointer-events: none;
            padding-top: 8vh; 
        }

        .fonts-ready .overlay { 
            opacity: 1; 
            visibility: visible; 
            filter: blur(0px); 
        }

        :root {
            --bg-color: #fdfdfd;
            --text-main: #1a1a1a;
            --text-sub: #888888;
            --accent-glow: rgba(96, 165, 250, 0.25); 
            --card-bg: rgba(255, 255, 255, 0.45); 
            --card-border: rgba(0, 0, 0, 0.08);
            --btn-border: #ddd;
            --star-color: #60a5fa;
            --focus-ring: #60a5fa;
            --panel-bg: rgba(255, 255, 255, 0.85);
        }

        [data-theme="dark"] {
            --bg-color: #0a0a0b;
            --text-main: #f0f0f0;
            --text-sub: #888888;
            --accent-glow: rgba(0, 242, 255, 0.25); 
            --card-bg: rgba(20, 20, 25, 0.4); 
            --card-border: rgba(255, 255, 255, 0.1);
            --btn-border: rgba(255, 255, 255, 0.2);
            --star-color: #00f2ff;
            --focus-ring: #00f2ff;
            --panel-bg: rgba(15, 15, 20, 0.9);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: var(--bg-color);
            font-family: 'LXGW WenKai TC', sans-serif;
            color: var(--text-main);
            transition: background-color 0.8s ease;
            -webkit-font-smoothing: antialiased;
        }

        .card, img, .lyrics-container {
            -webkit-user-select: none;
            user-select: none;
            -webkit-user-drag: none;
        }

        #bg-canvas { position: absolute; top: 0; left: 0; z-index: 0; }

        .theme-toggle {
            position: absolute; top: 25px; right: 20px; z-index: 40;
            pointer-events: auto; background: transparent;
            border: 0.5px solid var(--btn-border);
            color: var(--text-sub); border-radius: 4px;
            padding: 6px 10px; font-size: 0.65rem; cursor: pointer;
            letter-spacing: 0.1em; backdrop-filter: blur(5px);
        }

        .theme-toggle:hover { border-color: var(--star-color); }
        .theme-toggle:focus-visible, .mute-control:focus-visible, .btn:focus-visible, #sync-btn:focus-visible, #history-btn:focus-visible {
            outline: 2px solid var(--focus-ring);
            outline-offset: 3px;
        }

        /* 統一功能性圓形按鈕基礎樣式 */
        .control-btn, .mute-control {
            position: fixed; left: 25px; width: 40px; height: 40px;
            border-radius: 50%; border: 0.5px solid var(--btn-border);
            background: rgba(200, 200, 200, 0.3); color: var(--text-main); font-size: 1.1rem;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 100; padding: 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .control-btn:hover, .mute-control:hover { border-color: var(--star-color); }

        /* 按鈕垂直高度與硬體加速過渡設定 */
        .mute-control { bottom: 25px; }
        #sync-btn { bottom: 85px; }
        
        /* 🚀 歷史按鈕：初始死鎖在最高點，並加入流暢的 transform 平移與透明度動畫 */
        #history-btn { 
            bottom: 145px; 
            font-size: 0.95rem; 
            transition: 
                transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), 
                opacity 0.6s ease, 
                visibility 0.6s;
        }

        /* 🚀 歷史按鈕狀態控制：展開狀態（歌詞頁） */
        #history-btn.show-expanded {
            opacity: 1 !important;
            visibility: visible !important;
            pointer-events: auto !important;
            transform: translateY(0); /* 停留在 145px 原位 */
        }

        /* 🚀 歷史按鈕狀態控制：收合狀態（返回主頁） */
        #history-btn.show-collapsed {
            opacity: 0.4 !important; /* 低透明度 */
            visibility: visible !important;
            pointer-events: auto !important;
            transform: translateY(120px); /* 完美往下平移 120px 疊加至 mute-btn 坐標上 */
        }

        /* 同步按鈕狀態樣式 */
        #sync-btn .star-icon { width: 18px; height: 18px; }
        #sync-btn.active { background-color: rgba(96, 165, 250, 0.2); color: var(--star-color); border-color: var(--star-color); }
        #sync-btn.inactive { background-color: rgba(200, 200, 200, 0.3); color: var(--text-sub); }

        .header { text-align: center; margin-bottom: 1vh; opacity: 0; animation: fadeIn 1.2s forwards ease-out; width: 100%; }
        .header h1 { font-family: 'Montserrat', sans-serif; font-size: 1.4rem; font-weight: 300; letter-spacing: 0.6em; margin: 0; text-indent: 0.6em; }
        .header p { font-size: 0.8rem; letter-spacing: 0.2em; color: var(--text-sub); margin-top: 10px; font-weight: 300; }

        .watermark-inline {
            font-family: 'Montserrat', sans-serif; font-size: 0.65rem;
            letter-spacing: 0.5em; text-indent: 0.5em; text-align: center;
            margin-top: -2vh; margin-bottom: 1vh; white-space: nowrap;
            transition: color 0.8s ease; opacity: 0.5;
        }
        [data-theme="light"] .watermark-inline { color: #e0e0e0; } 
        [data-theme="dark"] .watermark-inline { color: #1a1a1c; }  

        .card-wrapper { 
            flex: 1; display: flex; align-items: flex-start; justify-content: center;
            pointer-events: auto; width: 90%; max-width: 380px; padding-top: 1vh; padding-bottom: 3vh; 
        }

        .card {
            width: 100%; min-height: 70vh; height: auto; max-height: 75vh;
            background: var(--card-bg); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            border-radius: 24px; border: 0.5px solid var(--card-border);
            box-shadow: 0 25px 70px rgba(0,0,0,0.06); 
            display: flex; flex-direction: column; padding: 35px 28px 20px 28px; box-sizing: border-box;
            position: relative; cursor: default; overflow: hidden;
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1); transform-style: preserve-3d; will-change: transform;
        }

        .footer-credits {
            position: absolute; bottom: 10px; width: 100%; text-align: center;
            font-family: 'Montserrat', sans-serif; font-size: 0.55rem; color: var(--text-sub);
            letter-spacing: 0.15em; opacity: 0.6; z-index: 30; pointer-events: none; 
        }

        .placeholder-container { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(1); 
            width: 160px; height: 160px; display: flex; align-items: center; justify-content: center; 
            z-index: 20; cursor: pointer; border-radius: 50%; opacity: 1; visibility: visible;
            transition: opacity 0.4s ease, visibility 0.4s, transform 0.4s ease;
        }
        
        .card.revealed .placeholder-container { 
            opacity: 0; visibility: hidden; pointer-events: none; transform: translate(-50%, -50%) scale(0.9); 
        }

        .placeholder-icon { font-size: 2.8rem; color: var(--star-color); animation: float 4s infinite ease-in-out; filter: drop-shadow(0 0 10px var(--star-color)); opacity: 0.8; }

        .placeholder-icon::after {
            content: ''; position: absolute; top: 50%; left: 50%; border-style: solid; border-color: var(--star-color); border-radius: 50%; transform: translate(-50%, -50%);
            animation: pulse-ripple 2.5s cubic-bezier(0.215, 0.610, 0.355, 1) infinite; pointer-events: none;
        }
        
        .card-content { 
            display: flex; width: 100%; height: 100%; flex-direction: column; position: relative; z-index: 10; 
            opacity: 0; visibility: hidden; pointer-events: none; transform: translateY(8px);
            transition: opacity 0.4s ease, visibility 0.4s, transform 0.4s ease; 
        }
        .card.revealed .card-content { opacity: 1; visibility: visible; pointer-events: auto; transform: translateY(0); transition: opacity 0.8s ease-out, transform 0.8s ease-out; }

        .lyrics-wrapper { position: relative; width: 100%; padding: 5vh 0; flex: 1; display: flex; align-items: center; justify-content: center; }
        .quote-mark { font-family: 'LXGW WenKai TC', sans-serif; font-size: 1.4rem; color: var(--accent-glow); position: absolute; line-height: 1; font-weight: 300; }
        .quote-up { top: 0; left: -10px; }
        .quote-down { bottom: 0; right: -10px; }
        .lyrics-container { line-height: 1.6; font-size: 1.15rem; text-align: center; letter-spacing: 0.05em; color: var(--text-main); position: relative; z-index: 2; width: 100%; word-break: break-word; }
        .song-title { font-size: 0.65rem; color: var(--text-sub); letter-spacing: 0.05em; text-align: center; margin: 10px -15px 20px -15px; flex-shrink: 0; padding: 0px; line-height: 1.5; z-index: 5; word-break: keep-all; }
        
        .insight-box { 
            font-size: 0.8rem; line-height: 1.65; color: var(--text-sub); text-align: justify; padding: 15px 0 10px 0; 
            border-top: 0.5px solid rgba(128,128,128,0.15); width: 100%; overflow-y: auto; opacity: 0; transform: translateY(10px); 
            transition: opacity 0.3s ease, transform 0.3s ease; 
        }
        .card.revealed .insight-box { opacity: 1; transform: translateY(0); transition: opacity 0.8s 0.2s ease, transform 0.8s 0.2s ease; }
        .insight-box::-webkit-scrollbar { width: 3px; }
        .insight-box::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.2); border-radius: 10px; }

        .action-area-inner { 
            display: flex; flex-direction: column; gap: 8px; width: 100%; margin-top: auto; padding-top: 15px; flex-shrink: 0;
            opacity: 0; visibility: hidden; transform: translateY(10px); pointer-events: none;
            transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s; 
        }
        .card.revealed .action-area-inner { opacity: 1; visibility: visible; transform: translateY(0); pointer-events: auto; transition: opacity 0.8s 0.4s ease, transform 0.8s 0.4s ease; }
        
        .btn { border-radius: 8px; padding: 11px; font-size: 0.75rem; cursor: pointer; transition: all 0.3s; font-family: 'LXGW WenKai TC', sans-serif; display: flex; align-items: center; justify-content: center; letter-spacing: 0.3em; text-indent: 0.3em; border: 1px solid transparent; box-sizing: border-box; }
        .btn-primary { background: var(--text-main); color: var(--bg-color); transition: all 0.3s ease; cursor: pointer; }
        .btn-secondary { background: transparent; border: 0.5px solid var(--btn-border); color: var(--text-sub); transition: all 0.3s ease; cursor: pointer; }
        .btn-primary:hover { border-color: var(--star-color); color: var(--star-color); transform: translateY(-2px); }
        .btn-secondary:hover { border-color: var(--star-color); background-color: rgba(0, 122, 255, 0.05); transform: translateY(-2px); }

        #lyrics-display { transition: color 0.4s ease, text-shadow 0.4s ease, transform 0.4s ease; }
        #lyrics-display.highlight { color: #2980b9 !important; text-shadow: 0 0 15px rgba(52, 152, 219, 0.4); transform: scale(1.02); }
        
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; color: var(--text-sub); gap: 20px; }
        .spinner { width: 24px; height: 24px; border: 2px solid rgba(128,128,128,0.1); border-top-color: var(--text-main); border-radius: 50%; animation: spin 1s linear infinite; }
        #toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 12px 24px; border-radius: 100px; font-size: 0.8rem; z-index: 200; opacity: 0; transition: opacity 0.3s; pointer-events: none; }

        /* 歷史共鳴清單面板磨砂玻璃樣式 */
        #history-panel {
            position: fixed; top: 0; left: -100%; width: 320px; height: 100%;
            background: var(--panel-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            box-shadow: 5px 0 30px rgba(0,0,0,0.15); z-index: 500;
            display: flex; flex-direction: column; box-sizing: border-box;
            transition: left 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #history-panel.open { left: 0; }
        .history-header { padding: 30px 24px 15px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid rgba(128,128,128,0.15); }
        .history-header h2 { margin: 0; font-size: 1.1rem; font-weight: 400; letter-spacing: 0.2em; }
        .close-history-btn { background: transparent; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text-sub); }
        .history-list { flex: 1; overflow-y: auto; padding: 15px 20px; display: flex; flex-direction: column; gap: 12px; }
        .history-item { padding: 15px; border-radius: 12px; background: rgba(128,128,128,0.06); border: 0.5px solid rgba(128,128,128,0.08); cursor: pointer; transition: all 0.25s ease; }
        .history-item:hover { border-color: var(--star-color); background: rgba(128,128,128,0.12); transform: translateY(-1px); }
        .history-item-lyrics { font-size: 0.88rem; line-height: 1.4; color: var(--text-main); margin-bottom: 6px; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .history-item-song { font-size: 0.68rem; color: var(--text-sub); letter-spacing: 0.05em; }
        .history-empty { text-align: center; color: var(--text-sub); font-size: 0.8rem; margin-top: 40px; letter-spacing: 0.1em; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        #export-container { position: fixed; left: -9999px; top: 0; width: 1080px; height: 1350px; padding: 80px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; align-items: center; }

        @keyframes pulse-ripple {
            0% { width: 0px; height: 0px; opacity: 0.8; border-width: 2px; }
            100% { width: 140px; height: 140px; opacity: 0; border-width: 0px; }
        }
    </style>
</head>
<body data-theme="light">

    <div id="initial-loader" role="progressbar" aria-busy="true" aria-label="網頁資源載入中">
        <div class="loader-text">RESONANCE</div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="init-progress"></div>
        </div>
    </div>

    <button class="theme-toggle" id="theme-btn" aria-label="切換深淺色主題">⚪︎地球</button>
    <canvas id="bg-canvas"></canvas>
    
    <div class="loading-overlay" id="loading" role="alert" aria-live="assertive">
        <div class="spinner"></div>
        <span style="letter-spacing: 0.2em;">正在記錄共鳴……</span>
    </div>
    <div id="toast" role="status" aria-live="polite">下載中...</div>

    <div class="overlay">
        <header class="header">
            <h1>RESONANCE</h1>
            <p>共鳴歌詞 · 泰倫斯Terence</p>
        </header>
        <div class="watermark-inline" aria-hidden="true">JLPL</div>
        
        <main class="card-wrapper">
            <div class="card" id="main-card">
                <div class="placeholder-container" id="placeholder" role="button" tabindex="0" aria-label="點擊接收隨機共鳴歌詞">
                    <div class="placeholder-icon" aria-hidden="true">✧</div>
                </div>
                <div class="card-content">
                    <article class="lyrics-wrapper">
                        <div class="quote-mark quote-up" aria-hidden="true">「</div>
                        <div class="lyrics-container" id="lyrics-display" tabindex="0" role="button" aria-label="點擊歌詞可跳轉至歌曲對應時間點"></div>
                        <div class="quote-mark quote-down" aria-hidden="true">」</div>
                    </article>
                    <div class="song-title" id="song-display"></div>
                    <div class="insight-box" id="insight-display" tabindex="0"></div>
                    <div class="action-area-inner">
                        <button class="btn btn-primary" id="download-btn">保存共鳴</button>
                        <button class="btn btn-secondary" id="reset-btn">再次共振</button>
                    </div>
                </div>
            </div>
        </main> 
        <footer class="footer-credits">
            Lyrics Resonance© 2026 Joyce Lam
        </footer>
    </div>

    <div id="yt-player" style="position: absolute; top: -9999px; left: -9999px; width: 0; height: 0;"></div>

    <button id="history-btn" class="control-btn" title="歷史共鳴足跡" aria-label="打開歷史共鳴面板">⌛︎</button>
    <button id="sync-btn" class="control-btn active" title="同步高光開關" aria-pressed="true">
        <svg viewBox="0 0 24 24" class="star-icon" aria-hidden="true">
            <path d="M12 2L14.8 9.2L22 12L14.8 14.8L12 22L9.2 14.8L2 12L9.2 9.2L12 2Z" fill="currentColor"/>
        </svg>
    </button>
    <button class="mute-control" id="mute-btn" aria-label="切換聲音靜音">♪</button>

    <div id="history-panel" aria-hidden="true">
        <div class="history-header">
            <h2>歷史共鳴足跡</h2>
            <button class="close-history-btn" id="close-history-btn" aria-label="關閉歷史面板">✕</button>
        </div>
        <div class="history-list" id="history-list-container"></div>
    </div>

    <div id="export-container" aria-hidden="true"></div>
    <div id="qr-hidden" style="display:none;" aria-hidden="true"></div>

    <script>
        const canvas = document.getElementById('bg-canvas');
        if (canvas) {
            canvas.style.opacity = "0";
            canvas.style.transition = "opacity 1s ease";
            setTimeout(() => { canvas.style.opacity = "1"; }, 1500);
        }

        const ctx = canvas ? canvas.getContext('2d') : null;
        const themeBtn = document.getElementById('theme-btn');
        let particles = []; 
        let ripples = []; 
        let isDark = false;
        let initProgressValue = 10;

        function updateProgress(val) {
            initProgressValue = Math.max(initProgressValue, val);
            const progressFill = document.getElementById('init-progress');
            if (progressFill) {
                progressFill.style.width = initProgressValue + '%';
            }
        }
        updateProgress(10); 

        class Particle {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.25; this.vy = (Math.random() - 0.5) * 0.25;
                this.size = isDark ? 1.4 : 1.1; this.colorIndex = Math.floor(Math.random() * 3);
            }
            update() {
                ripples.forEach(r => {
                    const dx = this.x - r.x; const dy = this.y - r.y; const d = Math.sqrt(dx*dx + dy*dy);
                    if (d < r.r && d > r.r - 20) {
                        const f = (r.r - d) / 20; const a = Math.atan2(dy, dx);
                        this.vx += Math.cos(a) * f * 0.5; this.vy += Math.sin(a) * f * 0.5;
                    }
                });
                this.x += this.vx; this.y += this.vy; this.vx *= 0.99; this.vy *= 0.99;
                if(this.x < 0 || this.x > canvas.width) this.vx *= -1; if(this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
            draw(targetCtx) {
                targetCtx.beginPath(); targetCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                const colors = isDark ? ['rgba(0, 242, 255, 0.4)', 'rgba(125, 103, 255, 0.4)', 'rgba(0, 150, 255, 0.4)'] : ['rgba(96, 165, 250, 0.3)', 'rgba(52, 211, 153, 0.25)', 'rgba(147, 197, 253, 0.3)'];
                targetCtx.fillStyle = colors[this.colorIndex]; targetCtx.fill();
            }

        }

        if (historyBtn) {
            historyBtn.addEventListener('click', (e) => { e.stopPropagation(); openHistory(); triggerHaptic(); });
        }
        if (closeHistoryBtn) {
            closeHistoryBtn.addEventListener('click', (e) => { e.stopPropagation(); closeHistory(); });
        }

        // 解鎖卡片邏輯
        const handleReveal = (e) => {
            if (e) e.stopPropagation();
            if (card.classList.contains('revealed')) return;
            triggerHaptic();
            
            if (!current) rollNextLyric();
            saveToHistory(current);

            card.classList.add('revealed');
            
            // 🚀 核心動畫調度：點開卡片時
            if (muteBtn) muteBtn.classList.add('show');
            if (syncBtn) syncBtn.classList.add('show');
            
            if (historyBtn) {
                // 移除收合樣式，切換為「完全展開狀態」（回歸最高點 145px 原位，透明度 1.0）
                historyBtn.classList.remove('show-collapsed');
                historyBtn.classList.add('show-expanded');
            }
            
            // 正式激活全域標記：使用者已經解鎖過，之後按鈕不再完全隱藏
            hasUnlockedOnce = true;
            
            if (isPlayerReady && player) {
                if(typeof player.setVolume === 'function') player.setVolume(0);
                if(typeof player.playVideo === 'function') player.playVideo();
            }
        };

        if (placeholder) {
            placeholder.addEventListener('click', handleReveal);
            placeholder.addEventListener('keydown', (e) => { if(e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleReveal(e); } });
        }

        // 再次共振（返回主頁）邏輯
        const resetBtn = document.getElementById('reset-btn');
        if (resetBtn) {
            resetBtn.addEventListener('click', (e) => {
                e.stopPropagation(); 
                card.classList.remove('revealed');
                
                // 靜音與同步按鈕如常淡出消失
                if (muteBtn) { muteBtn.classList.remove('show'); muteBtn.innerText = '♪'; }
                if (syncBtn) syncBtn.classList.remove('show');
                
                // 🚀 核心動畫調度：返回主頁時，歷史按鈕不消失，切換為「低透明收合狀態」往下位移
                if (historyBtn && hasUnlockedOnce) {
                    historyBtn.classList.remove('show-expanded');
                    historyBtn.classList.add('show-collapsed');
                }
                
                isMuted = true;
                fadeAudioOut();
                closeHistory();
                setTimeout(() => { rollNextLyric(); }, 400);
            });
        }

        function getCleanBgSnapshot() {
            const tempCanvas = document.createElement('canvas'); 
            if(!canvas) return '';
            tempCanvas.width = canvas.width; tempCanvas.height = canvas.height;
            const tCtx = tempCanvas.getContext('2d'); 
            if(!tCtx) return '';
            tCtx.fillStyle = isDark ? '#0a0a0b' : '#fdfdfd'; tCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
            particles.forEach((p, i) => { 
                p.draw(tCtx); 
                for(let j = i + 1; j < particles.length; j++) { 
                    const d = Math.hypot(p.x - particles[j].x, p.y - particles[j].y); 
                    if(d < 140) { 
                        tCtx.beginPath(); tCtx.strokeStyle = isDark ? `rgba(0, 242, 255, ${(1 - d/140) * 0.2})` : `rgba(96, 165, 250, ${(1 - d/140) * 0.2})`; tCtx.lineWidth = 0.5; tCtx.moveTo(p.x, p.y); tCtx.lineTo(particles[j].x, particles[j].y); tCtx.stroke(); 
                    } 
                } 
            });
            return tempCanvas.toDataURL();
        }

        async function generateQRCode(url) {
            const qrContainer = document.getElementById('qr-hidden'); 
            if(!qrContainer) return null;
            qrContainer.innerHTML = "";
            new QRCode(qrContainer, { text: url, width: 120, height: 120, colorDark: isDark ? "#ffffff" : "#1a1a1a", colorLight: "rgba(255,255,255,0)", correctLevel: QRCode.CorrectLevel.H });
            await new Promise(r => setTimeout(r, 120)); 
            const img = qrContainer.querySelector('img'); 
            return img ? img.src : null;
        }

        if (downloadBtn) {
            downloadBtn.addEventListener('click', async (e) => {
                e.stopPropagation(); if (!current || downloadBtn.disabled) return;
                downloadBtn.disabled = true; if(load) load.style.display = 'flex';

                const textOnly = current.t.replace(/<br>/g, '');
                const textLength = textOnly.length;
                let downloadFontSize = '46px'; 
                
                if (textLength > 60) downloadFontSize = '34px'; 
                else if (textLength > 23) downloadFontSize = '40px';
                else downloadFontSize = '50px';

                const cleanBg = getCleanBgSnapshot(); 
                const qrCodeData = await generateQRCode(current.u);
                const container = document.getElementById('export-container');
                if(!container) return;
                
                const textColor = isDark ? '#f0f0f0' : '#1a1a1a';
                const cardBg = isDark ? 'rgba(20, 20, 25, 0.9)' : 'rgba(255, 255, 255, 0.9)';
                const quoteColor = isDark ? 'rgba(0, 242, 255, 0.25)' : 'rgba(96, 165, 250, 0.25)';
                container.style.backgroundImage = `url(${cleanBg})`; container.style.backgroundSize = 'cover';

                container.innerHTML = `
                    <div style="text-align: center; margin-bottom: 45px; width: 100%;">
                        <div style="font-family: 'Montserrat'; font-size: 36px; letter-spacing: 0.6em; text-indent: 0.6em; font-weight: 300; color: ${textColor};">RESONANCE</div>
                        <div style="font-family: 'LXGW WenKai TC'; font-size: 20px; letter-spacing: 0.2em; font-weight: 300; color: #888888; margin-top: 12px;">共鳴歌詞 · 泰倫斯Terence</div>
                    </div>
                    <div style="width: 920px; height: 1050px; background: ${cardBg}; backdrop-filter: blur(25px); padding: 180px 80px 80px 80px; border-radius: 50px; display: flex; flex-direction: column; justify-content: flex-start; box-sizing: border-box; position: relative; box-shadow: 0 30px 80px rgba(0,0,0,0.15);">
                        <div style="position: relative; padding: 40px 0;">
                            <div style="font-family: 'LXGW WenKai TC'; font-size:70px; color: ${quoteColor}; position: absolute; top: 0; left: -25px; font-weight: 400;">「</div>
                            <div style="font-family: 'LXGW WenKai TC'; font-size: ${downloadFontSize}; line-height: 1.8; text-align: center; color: ${textColor}; position: relative; z-index: 2; padding: 0 50px;">${current.t}</div>
                            <div style="font-family: 'LXGW WenKai TC'; font-size: 70px; color: ${quoteColor}; position: absolute; bottom: 0; right: -25px; font-weight: 400;">」</div>
                        </div>
                        <div style="font-family: 'LXGW WenKai TC'; font-size: 28px; color: #888; text-align: center; margin-top: 40px;">《${current.s}》</div>
                        <div style="position: absolute; bottom: 50px; right: 60px; display: flex; flex-direction: column; align-items: center; gap: 10px;">
                            <img src="${qrCodeData}" style="width: 100px; height: 100px; opacity: 0.8;" alt="QR Code"/>
                            <span style="font-family: 'Montserrat'; font-size: 14px; color: #888;">SCAN TO LISTEN</span>
                        </div>
                    </div>
                `;
                try {
                    await new Promise(r => setTimeout(r, 600));
                    const canvasOut = await html2canvas(container, { scale: 2, useCORS: true });
                    canvasOut.toBlob((blob) => {
                        if(!blob) return;
                        const url = URL.createObjectURL(blob); 
                        const link = document.createElement('a'); 
                        link.href = url; 
                        link.download = `Resonance_${current.s.substring(0,16)}.png`;
                        link.click(); 
                        showToast("已保存至相簿");
                    });
                } catch (err) { showToast("下載失敗 可截圖"); } finally { downloadBtn.disabled = false; if(load) load.style.display = 'none'; }
            });
        }

        function showToast(msg) { 
            if(!toast) return;
            toast.innerText = msg; toast.style.opacity = '1'; 
            setTimeout(() => toast.style.opacity = '0', 3000); 
        }

        function checkOverallReady() {
            if (fontsReadyStatus && playerReadyStatus) {
                updateProgress(100);
                setTimeout(() => {
                    document.body.classList.add('fonts-ready');
                    const loader = document.getElementById('initial-loader');
                    if(loader) setTimeout(() => { loader.style.display = 'none'; }, 2000);
                }, 400); 
            }
        }

        async function waitForFonts() {
            if(document.fonts && typeof document.fonts.ready !== 'undefined') {
                await document.fonts.ready;
            }
            return new Promise((resolve) => {
                const checkFonts = () => {
                    const isWenKaiReady = document.fonts ? document.fonts.check('1em "LXGW WenKai TC"') : true;
                    const isMontReady = document.fonts ? document.fonts.check('1em "Montserrat"') : true;
                    if (isWenKaiReady && isMontReady) resolve(); else setTimeout(checkFonts, 100); 
                };
                checkFonts();
            });
        }

        waitForFonts().then(() => {
            fontsReadyStatus = true;
            updateProgress(50); 
            checkOverallReady();
        });

        setTimeout(() => {
            if (!fontsReadyStatus || !playerReadyStatus) {
                fontsReadyStatus = true; playerReadyStatus = true;
                updateProgress(100); checkOverallReady();
            }
        }, 4500);

        let isSyncEnabled = true; 
        let syncTimer = null;
        const lyricDisplay = document.getElementById('lyrics-display'); 

        function updateSyncBtnUI() {
            if (!syncBtn) return;
            if (isSyncEnabled) {
                syncBtn.classList.add('active'); syncBtn.classList.remove('inactive');
                syncBtn.setAttribute('aria-pressed', 'true');
            } else {
                syncBtn.classList.add('inactive'); syncBtn.classList.remove('active');
                syncBtn.setAttribute('aria-pressed', 'false');
            }
        }
        updateSyncBtnUI();

        if (syncBtn) {
            syncBtn.addEventListener('click', () => {
                isSyncEnabled = !isSyncEnabled;
                updateSyncBtnUI();
                triggerHaptic();
                if (!isSyncEnabled && lyricDisplay) lyricDisplay.classList.remove('highlight');
            });
        }

        function startSyncChecking() {
            if (syncTimer) clearInterval(syncTimer);
            syncTimer = setInterval(() => {
                if (document.hidden) return;
                if (!isSyncEnabled || !player || !isPlayerReady || !lyricDisplay) return;
                if (typeof player.getCurrentTime !== 'function') return;

                const currentTime = player.getCurrentTime();
                
                // 防禦機制：只有當卡片完全被點開揭曉（revealed）時，才觸發高光
                if (card.classList.contains('revealed') && current && currentTime >= current.start) {
                    lyricDisplay.classList.add('highlight');
                } else {
                    lyricDisplay.classList.remove('highlight');
                }
            }, 500); 
        }
        startSyncChecking();

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) { clearInterval(syncTimer); } else { startSyncChecking(); }
        });

        if (lyricDisplay) {
            lyricDisplay.style.cursor = 'pointer'; 
            
            lyricDisplay.addEventListener('click', () => { triggerLyricJump(); });
            lyricDisplay.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    triggerLyricJump();
                }
            });
        }

        function triggerLyricJump() {
            if (current && current.start !== undefined && player && isPlayerReady && typeof player.seekTo === 'function') {
                player.seekTo(current.start);
                if(typeof player.playVideo === 'function') player.playVideo();
                lyricDisplay.classList.add('highlight');
                triggerHaptic();
            }
        }
        
        // ===== ❌ 全域防護機制區塊 =====
        document.addEventListener('contextmenu', (e) => { e.preventDefault(); return false; }, false);
        document.addEventListener('dragstart', (e) => { e.preventDefault(); return false; });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'F12' || e.keyCode === 123) { e.preventDefault(); return false; }
            if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C' || e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) { e.preventDefault(); return false; }
            if ((e.ctrlKey || e.metaKey) && (e.key === 'u' || e.key === 'U' || e.keyCode === 85)) { e.preventDefault(); return false; }
            if ((e.ctrlKey || e.metaKey) && (e.key === 's' || e.key === 'S' || e.keyCode === 83)) { e.preventDefault(); return false; }
        });
        
        console.log("%c停！別看我的原始碼，快去聽歌吧！", "color: blue; font-size: 30px; font-weight: bold;");
    </script>
</body>
</html>
